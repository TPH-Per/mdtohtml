<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q1 2025 Financial Summary</title>
  <link rel="stylesheet" href="../../packages/stylesheet/dist/styles.css">
</head>
<body>
  <main class="container stack">
    <h1 class="heading-xl">Q1 2025 Financial Summary</h1>
    <div class="callout callout-info">
      <p>This report covers January 1 to March 31, 2025.</p>
    </div>
    
    <div class="grid-2">
      <div class="card">
        <div class="card-header">Revenue</div>
        <div class="card-body prose">
          <h2 class="heading-lg">$4.2M</h2>
          <p class="text-muted">+12% YoY</p>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Operating Costs</div>
        <div class="card-body prose">
          <h2 class="heading-lg">$2.8M</h2>
          <p class="text-muted">-3% YoY</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Expense Breakdown</div>
      <div class="card-body">
        <table class="data-table data-table-striped">
          <thead>
            <tr>
              <th>Department</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Engineering</td>
              <td>$1.2M</td>
              <td><span class="badge badge-success">On Budget</span></td>
            </tr>
            <tr>
              <td>Marketing</td>
              <td>$800K</td>
              <td><span class="badge badge-warning">Over Budget</span></td>
            </tr>
            <tr>
              <td>Sales</td>
              <td>$800K</td>
              <td><span class="badge badge-success">On Budget</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</body>
</html>
